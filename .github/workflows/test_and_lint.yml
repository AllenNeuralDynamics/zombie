name: Lint and run tests

on:
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Python CI — legacy Panel app and shared utilities
  # Keep this until the Mosaic rewrite is fully validated.
  # ---------------------------------------------------------------------------
  python-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.13' ]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install -e .[dev]
    - name: Run linter checks
      run: flake8 . && interrogate --verbose .
    - name: Run tests and coverage
      run: coverage run -m unittest discover && coverage report

  # ---------------------------------------------------------------------------
  # JavaScript CI — Mosaic/DuckDB-WASM frontend (web/)
  # ---------------------------------------------------------------------------
  js-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm test

    - name: Build production bundle
      run: npm run build
