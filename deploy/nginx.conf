# ZOMBIE nginx configuration
#
# Listens on :8000 (the single port exposed by the container).
#
# Routes:
#   /ws           → duckdb-server WebSocket on :3000
#                   Used by the Mosaic coordinator (socketConnector).
#
#   /assets       → Panel serve on :8001
#   /contributions
#   /subject
#                   Panel/Bokeh uses its own WebSocket internally;
#                   the proxy_set_header Upgrade lines handle that.
#
#   /             → web/dist/ (Mosaic SPA, served as static files)
#                   Falls back to index.html for client-side routing.

server {
    listen 8000;
    server_name _;

    # ------------------------------------------------------------------
    # duckdb-server WebSocket proxy
    # Strips the /ws prefix — duckdb-server listens at its root path.
    # ------------------------------------------------------------------
    location /ws {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # Panel apps — also need WebSocket upgrade for Bokeh comms.
    # ------------------------------------------------------------------
    location ~ ^/(assets|contributions|subject)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # Mosaic SPA — static files with HTML5 history fallback.
    # ------------------------------------------------------------------
    root /app/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
