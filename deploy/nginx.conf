# ZOMBIE nginx configuration
#
# Listens on :8000 (the single port exposed by the container).
#
# Routes:
#   /ws           → duckdb-server WebSocket on :3000
#                   Used by the Mosaic coordinator (socketConnector).
#
#   /docdb/       → DocDB proxy on :3001
#                   Avoids CORS — browser talks to same origin.
#
#   /             → index.html          (main data explorer)
#   /assets       → assets.html         (assets table)
#   /contributions→ contributions.html  (CReDIT landing page)
#   /contributions/view → contributions/view.html (read-only preview)
#   /contributions/edit → contributions/edit.html (admin editor)
#   /contributions/add  → contributions/add.html  (self-service wizard)
#   /subject      → subject.html        (subject viewer, no DuckDB)
#   /project      → project.html        (project viewer, no DuckDB)
#   /smartspim          → smartspim.html          (SmartSPIM assets)
#   /fiber_photometry   → fiber_photometry.html   (Fiber Photometry Platform)
#   /vr_foraging        → vr_foraging.html        (VR Foraging Platform)
#   /dynamic_foraging   → dynamic_foraging.html   (Dynamic Foraging Platform)
#   /slap2              → slap2.html              (SLAP2 Platform)
#   /sessions           → sessions.html           (behavioral sessions)
#   /names              → names.html              (hidden: name normalization graph)
#   /record             → record.html             (hidden: metadata JSON viewer)
#   /upgrade            → upgrade.html            (hidden: metadata upgrade status)
#
# Each page has its own entry point so pages that don't need DuckDB/httpfs
# can load independently.

server {
    listen 8000;
    server_name _;

    # ------------------------------------------------------------------
    # aind-metadata-viz contributions API proxy
    # Strips /metadata-viz prefix and forwards to the Tornado service.
    # Handles both GET (/contributions/get) and POST (/contributions/post).
    # ------------------------------------------------------------------
    location /metadata-viz/ {
        proxy_pass         https://metadata-portal.allenneuraldynamics.org/;
        proxy_set_header   Host             metadata-portal.allenneuraldynamics.org;
        proxy_ssl_server_name on;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Metadata portal upgrade API proxy
    # Strips /metadata-portal prefix and forwards to the portal service.
    # ------------------------------------------------------------------
    location /metadata-portal/ {
        proxy_pass         https://metadata-portal.allenneuraldynamics.org/;
        proxy_set_header   Host             metadata-portal.allenneuraldynamics.org;
        proxy_ssl_server_name on;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # AIND DocDB REST API proxy
    # Forwards /api/* → https://api.allenneuraldynamics.org/*
    # Avoids CORS — the browser only talks to the same origin.
    # ------------------------------------------------------------------
    location /docdb/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # DocDB v1 proxy — strips /docdb-v1 and forwards to the /v1/ sub-path,
    # returning the original (pre-upgrade) record for the upgrade runner.
    location /docdb-v1/ {
        proxy_pass         http://127.0.0.1:3001/v1/;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # duckdb-server WebSocket proxy
    # Strips the /ws prefix — duckdb-server listens at its root path.
    # ------------------------------------------------------------------
    location /ws {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # Static files — each route maps to its own HTML page.
    # ------------------------------------------------------------------
    root /app/web/dist;
    index index.html;

    location = /assets {
        try_files /assets.html =404;
    }

    location = /contributions {
        try_files /contributions.html =404;
    }

    location = /contributions/view {
        try_files /contributions/view.html =404;
    }

    location = /contributions/edit {
        try_files /contributions/edit.html =404;
    }

    location = /contributions/add {
        try_files /contributions/add.html =404;
    }

    location = /subject {
        try_files /subject.html =404;
    }

    location = /smartspim {
        try_files /smartspim.html =404;
    }

    location = /coordinate-system-builder {
        try_files /coordinate_system_builder.html =404;
    }
    
    location = /sessions {
        try_files /sessions.html =404;
    }

    location = /quality_control {
        try_files /quality_control.html =404;
    }

    location = /fiber_photometry {
        try_files /fiber_photometry.html =404;
    }

    location = /vr_foraging {
        try_files /vr_foraging.html =404;
    }

    location = /dynamic_foraging {
        try_files /dynamic_foraging.html =404;
    }

    location = /slap2 {
        try_files /slap2.html =404;
    }

    location = /project {
        try_files /project.html =404;
    }

    location = /names {
        try_files /names.html =404;
    }

    location = /record {
        try_files /record.html =404;
    }

    location = /upgrade {
        try_files /upgrade.html =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
