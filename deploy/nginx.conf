# ZOMBIE nginx configuration
#
# Listens on :8000 (the single port exposed by the container).
#
# Routes:
#   /ws           → duckdb-server WebSocket on :3000
#                   Used by the Mosaic coordinator (socketConnector).
#
#   /docdb/       → DocDB proxy on :3001
#                   Avoids CORS — browser talks to same origin.
#
#   /             → web/dist/ (Mosaic SPA, served as static files)
#                   Falls back to index.html for client-side routing.
#
# All routes (/assets, /subject, /contributions) are now served by
# the Mosaic SPA via client-side routing (try_files fallback).

server {
    listen 8000;
    server_name _;

    # ------------------------------------------------------------------
    # AIND DocDB REST API proxy
    # Forwards /api/* → https://api.allenneuraldynamics.org/*
    # Avoids CORS — the browser only talks to the same origin.
    # ------------------------------------------------------------------
    location /docdb/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # duckdb-server WebSocket proxy
    # Strips the /ws prefix — duckdb-server listens at its root path.
    # ------------------------------------------------------------------
    location /ws {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ------------------------------------------------------------------
    # Mosaic SPA — static files with HTML5 history fallback.
    # ------------------------------------------------------------------
    root /app/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
