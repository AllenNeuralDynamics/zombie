<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRF Playback — 841314 · 2026-06-03</title>
    <style>
      /* ------------------------------------------------------------------ */
      /* Reset / base                                                         */
      /* ------------------------------------------------------------------ */
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        background: #0f0f1a;
        color: #cdd6f4;
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        min-height: 100vh;
      }

      /* ------------------------------------------------------------------ */
      /* Page header                                                          */
      /* ------------------------------------------------------------------ */
      .vrf-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 10px 16px 8px;
        border-bottom: 1px solid #252535;
      }
      .vrf-header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: normal;
        letter-spacing: 0.06em;
        color: #89b4fa;
      }
      .vrf-header small { color: #6c7086; font-size: 12px; }

      /* ------------------------------------------------------------------ */
      /* Main layout: canvas left, HUD right                                 */
      /* ------------------------------------------------------------------ */
      .vrf-layout {
        display: flex;
        gap: 18px;
        padding: 16px;
        align-items: flex-start;
      }

      /* ------------------------------------------------------------------ */
      /* World canvas                                                         */
      /* ------------------------------------------------------------------ */
      .vrf-world { flex: 0 0 auto; position: relative; }

      #vrf-canvas {
        display: block;
        /* CSS display size = 2× the logical canvas resolution */
        width:  280px;   /* 2 × 140 logical px */
        height: 480px;   /* 2 × 240 logical px */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 1px solid #252535;
        background: #11111c;
      }

      /* position label: shows "IN PATCH" or "INTER-PATCH" over canvas */
      .vrf-zone-badge {
        position: absolute;
        top: 8px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.12em;
        pointer-events: none;
        color: #6c7086;
      }

      /* ------------------------------------------------------------------ */
      /* HUD panel                                                            */
      /* ------------------------------------------------------------------ */
      .vrf-hud {
        flex: 0 0 288px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* Shared card style */
      .vrf-card {
        background: #1a1a2e;
        border: 1px solid #252535;
        border-radius: 4px;
        padding: 8px 10px;
      }

      .vrf-card-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #6c7086;
        margin-bottom: 6px;
      }

      /* ── Stats card ── */
      #vrf-stats {
        line-height: 1.7;
        min-height: 52px;
      }
      #vrf-stats b { color: #89b4fa; }
      .vrf-state { color: #a6e3a1; }

      /* ── Depletion bar ── */
      #vrf-depletion {
        /* Plot SVG will be inserted here */
        min-height: 88px;
      }
      #vrf-depletion svg { overflow: visible; }

      /* ── Reward-sites strip ── */
      #vrf-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .vrf-dot {
        display: inline-block;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #444455;
        cursor: default;
      }

      /* ── Controls card ── */
      .vrf-transport {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      #vrf-play {
        background: #313244;
        border: 1px solid #45475a;
        color: #cdd6f4;
        border-radius: 4px;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        min-width: 36px;
      }
      #vrf-play:hover { background: #45475a; }

      #vrf-time {
        color: #89b4fa;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
      }

      .vrf-scrub-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      #vrf-scrub {
        flex: 1;
        cursor: pointer;
        accent-color: #89b4fa;
      }

      .vrf-speed-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .vrf-speed-row label { color: #6c7086; font-size: 11px; }
      #vrf-speed {
        background: #313244;
        border: 1px solid #45475a;
        color: #cdd6f4;
        border-radius: 3px;
        padding: 2px 6px;
        cursor: pointer;
      }

      .vrf-keys {
        font-size: 10px;
        color: #6c7086;
        line-height: 1.8;
      }
      .vrf-keys kbd {
        background: #313244;
        border: 1px solid #45475a;
        border-radius: 3px;
        padding: 1px 5px;
        font-family: inherit;
      }

      /* ── Loading overlay ── */
      #vrf-loading {
        padding: 16px;
        color: #6c7086;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <div class="vrf-header">
      <h1>VRF Session Playback</h1>
      <small>subject 841314 · 2026-06-03 · 53 min · 54 patches · 147 rewards</small>
    </div>

    <div id="vrf-loading">Loading…</div>

    <div class="vrf-layout">
      <!-- World canvas -->
      <div class="vrf-world">
        <canvas id="vrf-canvas" width="140" height="240"></canvas>
      </div>

      <!-- HUD -->
      <div class="vrf-hud">

        <!-- Session stats -->
        <div class="vrf-card" id="vrf-stats">–</div>

        <!-- Depletion chart -->
        <div class="vrf-card">
          <div class="vrf-card-label">Patch depletion</div>
          <div id="vrf-depletion"></div>
        </div>

        <!-- Reward-sites strip -->
        <div class="vrf-card">
          <div class="vrf-card-label">Reward sites (window)</div>
          <div id="vrf-strip"></div>
        </div>

        <!-- Playback controls -->
        <div class="vrf-card">
          <div class="vrf-transport">
            <button id="vrf-play">▶</button>
            <span id="vrf-time">00:00 / 00:00</span>
          </div>
          <div class="vrf-scrub-row">
            <input type="range" id="vrf-scrub" min="0" max="1000" step="1" value="0" />
          </div>
          <div class="vrf-speed-row">
            <label for="vrf-speed">Speed</label>
            <select id="vrf-speed">
              <option value="1">1×</option>
              <option value="5">5×</option>
              <option value="10" selected>10×</option>
              <option value="20">20×</option>
              <option value="60">60×</option>
            </select>
          </div>
          <div class="vrf-keys">
            <kbd>Space</kbd> play / pause &nbsp;
            <kbd>←</kbd> <kbd>→</kbd> prev / next patch &nbsp;
            <kbd>,</kbd> <kbd>.</kbd> speed −/+
          </div>
        </div>

      </div><!-- .vrf-hud -->
    </div><!-- .vrf-layout -->

    <script type="module" src="/src/vrf_play.js"></script>
  </body>
</html>
