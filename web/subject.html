<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Explorer — Subject</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);}());</script>
    <link rel="stylesheet" href="/styles/app.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-brand">
        <h1 class="app-title">Data Explorer</h1>
      </div>
      <nav class="app-nav" aria-label="Main navigation">
        <a href="/">Explorer</a>
        <a href="/assets">Assets</a>
        <a href="/contributions">Contributions</a>
        <a href="/subject" aria-current="page">Subject</a>
        <a href="/smartspim">SmartSPIM</a>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark/light mode"></button>
      </nav>
    </header>

    <main id="app" class="app-main">
    </main>

    <script type="module" src="/src/subject-entry.js"></script>
    <script>(function(){var btn=document.getElementById('theme-toggle');function isDark(){var t=document.documentElement.getAttribute('data-theme');return t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches);}function update(){btn.textContent=isDark()?'\u2600':'\u263e';}btn.addEventListener('click',function(){var next=isDark()?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next);update();});update();window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',update);}());</script>
  </body>
</html>
